<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña — NEXUM</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <div class="logo-texto">NEXUM</div>
      <div class="logo-claim">El vínculo que sustenta</div>
    </div>
    <div class="auth-body">
      <h2>Nueva contraseña</h2>
      <p class="subtitulo">Ingresa tu nueva contraseña para acceder al sistema</p>

      <div id="alerta-nueva" class="alerta-error"></div>
      <div id="exito-nueva" class="alerta-exito"></div>

      <form id="form-nueva-pass" novalidate>
        <div class="input-grupo">
          <label for="pass1">Nueva contraseña</label>
          <input type="password" id="pass1" placeholder="Mínimo 8 caracteres" required>
        </div>
        <div class="input-grupo">
          <label for="pass2">Confirmar contraseña</label>
          <input type="password" id="pass2" placeholder="Repite la contraseña" required>
        </div>
        <button type="submit" class="btn-submit">Guardar nueva contraseña</button>
      </form>
    </div>
  </div>

  <script>
    // Supabase maneja el token de recuperación automáticamente en la URL
    document.getElementById('form-nueva-pass').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass1  = document.getElementById('pass1').value;
      const pass2  = document.getElementById('pass2').value;
      const alerta = document.getElementById('alerta-nueva');
      const exito  = document.getElementById('exito-nueva');

      alerta.classList.remove('visible');
      exito.classList.remove('visible');

      if (pass1.length < 8) {
        alerta.textContent = 'La contraseña debe tener al menos 8 caracteres.';
        alerta.classList.add('visible'); return;
      }
      if (pass1 !== pass2) {
        alerta.textContent = 'Las contraseñas no coinciden.';
        alerta.classList.add('visible'); return;
      }

      const { error } = await _supabase.auth.updateUser({ password: pass1 });
      if (error) {
        alerta.textContent = 'Error al actualizar la contraseña. El enlace puede haber expirado.';
        alerta.classList.add('visible');
      } else {
        exito.textContent = '✓ Contraseña actualizada. Redirigiendo al login…';
        exito.classList.add('visible');
        setTimeout(() => window.location.href = '/login.html', 2500);
      }
    });
  </script>
</body>
</html>
