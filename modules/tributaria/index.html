<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tributaria — NEXUM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/tema.js"></script>
  <script src="../../js/notas.js"></script>
  <script src="../../js/layout.js"></script>
  <script src="../../js/sunat-parser.js"></script>
</head>
<body>
<div class="nexum-layout">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="cerrarSidebar()"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="contenido-principal">
    <header class="header-top" id="header-top"></header>
    <main class="area-contenido">

      <div class="page-header">
        <div>
          <h1>📋 Tributaria</h1>
          <p>Registro de ventas, compras e IGV mensual</p>
        </div>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--color-borde);overflow-x:auto;">
        <button class="tab-btn activo" id="tab-ventas"   onclick="activarTab('ventas')">📤 Registro de ventas</button>
        <button class="tab-btn"        id="tab-compras"  onclick="activarTab('compras')">📥 Registro de compras</button>
        <button class="tab-btn"        id="tab-resumen"  onclick="activarTab('resumen')">📊 Resumen IGV</button>
        <button class="tab-btn"        id="tab-importar" onclick="activarTab('importar')">📊 Importar SUNAT</button>
      </div>

      <div id="contenido-tab">
        <div class="cargando"><div class="spinner"></div><span>Cargando…</span></div>
      </div>

    </main>
  </div>
</div>

<div id="modal-container"></div>

<style>
.tab-btn {
  padding:10px 16px; border:none; background:none; cursor:pointer;
  font-family:var(--font); font-size:13px; font-weight:500;
  color:var(--color-texto-suave); border-bottom:2px solid transparent;
  margin-bottom:-2px; transition:all 0.2s; white-space:nowrap;
}
.tab-btn:hover { color:var(--color-primario); }
.tab-btn.activo { color:var(--color-secundario); border-bottom-color:var(--color-secundario); }
</style>

<script src="../../modules/tributaria/modules/tri-ventas.js?v=2&t=20260505"></script>
<script src="../../modules/tributaria/modules/tri-compras.js?v=2&t=20260505"></script>
<script src="../../modules/tributaria/modules/tri-resumen.js?v=1&t=20260505"></script>
<script src="../../modules/tributaria/modules/tri-rh.js?v=2&t=20260505"></script>
<script src="../../modules/tributaria/modules/tri-importar-sunat.js?v=6&t=20260504"></script>
<script>
// fix-import-v5: insert + sesión + panel de error completo
async function _confirmarImportSUNAT() {
  const validos = _sunat_preview_data.filter(d => d._ok);
  if (!validos.length) return;
  const btn = document.getElementById('btn-confirmar-sunat');
  if (btn) { btn.disabled = true; btn.textContent = 'Importando…'; }

  // Verificar sesión activa antes de intentar insertar
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) {
    mostrarToast('Sesión expirada. Recarga la página e inicia sesión nuevamente.', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Importar'; }
    return;
  }
  if (!empresa_activa?.id) {
    mostrarToast('No hay empresa activa. Vuelve al selector de empresa.', 'error');
    if (btn) { btn.disabled = false; btn.textContent = 'Importar'; }
    return;
  }
  console.log('[NEXUM-IMPORT] Sesión OK. User:', session.user.id, '| Empresa:', empresa_activa.id);

  let ok = 0, errCount = 0, _dbError = null, _primerRow = null;

  if (_sunat_preview_tipo === 'compras') {
    const rows = validos.map(r => ({
      empresa_operadora_id: empresa_activa.id, periodo: r.periodo,
      fecha_emision: r.fecha, fecha_vencimiento: r.fecha_vencimiento,
      tipo_documento_codigo: r.tipo_documento_codigo, serie: r.serie, numero: r.numero,
      ruc_proveedor: r.ruc_proveedor, nombre_proveedor: r.nombre_proveedor,
      base_imponible: r.base_imponible, igv: r.igv, total: r.total,
      moneda: r.moneda || 'PEN', tipo_cambio: r.tipo_cambio || 1,
      codigo_detraccion: r.codigo_detraccion, estado: 'EMITIDO',
      usuario_id: perfil_usuario?.id || null,
    }));
    _primerRow = rows[0];
    console.log('[NEXUM-IMPORT] empresa_activa.id =', empresa_activa?.id);
    console.log('[NEXUM-IMPORT] Primer registro a insertar =', JSON.stringify(rows[0]));
    for (let i = 0; i < rows.length; i += 50) {
      const chunk = rows.slice(i, i + 50);
      const { data: ins, error } = await _supabase.from('registro_compras').insert(chunk).select('id');
      if (!error) { ok += ins?.length ?? 0; }
      else if (error.code === '23505') {
        for (const row of chunk) {
          const { data: r2, error: e2 } = await _supabase.from('registro_compras').insert(row).select('id').maybeSingle();
          if (!e2) ok++;
          else if (e2.code !== '23505') { errCount++; if (!_dbError) _dbError = e2; console.error('[compras-row]', e2); }
        }
      } else { errCount += chunk.length; if (!_dbError) _dbError = error; console.error('[compras-chunk]', error); }
    }

  } else if (_sunat_preview_tipo === 'ventas') {
    const rows = validos.map(r => ({
      empresa_operadora_id: empresa_activa.id, periodo: r.periodo,
      fecha_emision: r.fecha, fecha_vencimiento: r.fecha_vencimiento,
      tipo_documento_codigo: r.tipo_documento_codigo, serie: r.serie, numero: r.numero,
      ruc_cliente: r.ruc_cliente, nombre_cliente: r.nombre_cliente,
      base_imponible: r.base_imponible, igv: r.igv, total: r.total,
      moneda: r.moneda || 'PEN', tipo_cambio: r.tipo_cambio || 1,
      estado: 'EMITIDO', usuario_id: perfil_usuario?.id || null,
    }));
    _primerRow = rows[0];
    console.log('[NEXUM-IMPORT] empresa_activa.id =', empresa_activa?.id);
    console.log('[NEXUM-IMPORT] Primer registro ventas =', JSON.stringify(rows[0]));
    for (let i = 0; i < rows.length; i += 50) {
      const chunk = rows.slice(i, i + 50);
      const { data: ins, error } = await _supabase.from('registro_ventas').insert(chunk).select('id');
      if (!error) { ok += ins?.length ?? 0; }
      else if (error.code === '23505') {
        for (const row of chunk) {
          const { data: r2, error: e2 } = await _supabase.from('registro_ventas').insert(row).select('id').maybeSingle();
          if (!e2) ok++;
          else if (e2.code !== '23505') { errCount++; if (!_dbError) _dbError = e2; console.error('[ventas-row]', e2); }
        }
      } else { errCount += chunk.length; if (!_dbError) _dbError = error; console.error('[ventas-chunk]', error); }
    }

  } else if (_sunat_preview_tipo === 'rh') {
    for (const r of validos) {
      if (!r.ruc_dni_prestador) { errCount++; continue; }
      let { data: ps } = await _supabase.from('prestadores_servicios').select('id').eq('dni', r.ruc_dni_prestador).maybeSingle();
      if (!ps) {
        const { data: nuevo, error: errPS } = await _supabase.from('prestadores_servicios').insert({ dni: r.ruc_dni_prestador, nombre: r.nombre_prestador || r.ruc_dni_prestador, ruc: r.ruc_dni_prestador.length === 11 ? r.ruc_dni_prestador : null, activo: true }).select().single();
        if (errPS) { errCount++; continue; }
        ps = nuevo;
      }
      const { error } = await _supabase.from('rh_registros').insert({ empresa_operadora_id: empresa_activa.id, prestador_id: ps.id, periodo: r.periodo, fecha_emision: r.fecha, numero_rh: r.numero_rh, concepto: r.concepto || 'SERVICIO', monto_bruto: r.monto_bruto, tiene_retencion: r.tiene_retencion, porcentaje_retencion: r.porcentaje_retencion, monto_retencion: r.monto_retencion, monto_neto: r.monto_neto, estado: r.estado, observaciones: r.observaciones, usuario_id: perfil_usuario?.id || null });
      if (error) { errCount++; if (!_dbError) _dbError = error; } else ok++;
    }
  }

  document.getElementById('modal-sunat-import')?.remove();
  const totalValidos = validos.length;
  const duplicados = totalValidos - ok - errCount;
  let msg = `✓ ${ok} importados` +
    (duplicados > 0 ? ` · ${duplicados} ya existían (omitidos)` : '') +
    (errCount   > 0 ? ` · ${errCount} errores` : '');
  mostrarToast(msg, errCount > 0 ? 'atencion' : 'exito');

  // Panel de error completo visible en pantalla (no se corta como el toast)
  if (errCount > 0) {
    document.getElementById('nexum-import-err-panel')?.remove();
    const panel = document.createElement('div');
    panel.id = 'nexum-import-err-panel';
    panel.style.cssText = 'position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
    const errInfo = _dbError
      ? `Code:    ${_dbError.code    || '(vacío)'}\nMessage: ${_dbError.message || '(vacío)'}\nDetails: ${_dbError.details || '(vacío)'}\nHint:    ${_dbError.hint    || '(vacío)'}`
      : '(sin objeto de error — revisar consola)';
    const rowInfo = _primerRow ? JSON.stringify(_primerRow, null, 2) : '(ninguno capturado)';
    panel.innerHTML = `<div style="background:#1a202c;padding:24px 28px;border-radius:12px;font-family:monospace;font-size:12px;max-width:660px;width:92vw;max-height:88vh;overflow:auto;white-space:pre-wrap;line-height:1.6;color:#fc8181">
<span style="color:#fff;font-size:15px;font-weight:bold">❌ Error al importar — ${errCount} de ${totalValidos} filas fallaron</span>

<span style="color:#f6e05e">━━━ Error de base de datos ━━━</span>
${errInfo}

<span style="color:#68d391">━━━ Primer registro enviado a la BD ━━━</span>
${rowInfo}

<span style="color:#a0aec0;font-size:11px">Toca o haz clic en cualquier lugar para cerrar este panel.</span></div>`;
    panel.onclick = () => panel.remove();
    document.body.appendChild(panel);
  }

  if (_sunat_preview_tipo === 'compras' && typeof cargarCompras === 'function') await cargarCompras();
  if (_sunat_preview_tipo === 'ventas'  && typeof cargarVentas  === 'function') await cargarVentas();
  if (_sunat_preview_tipo === 'rh'      && typeof cargarRH      === 'function') await cargarRH();
}
</script>

<script>
let perfil_usuario = null;
let empresa_activa = null;

(async () => {
  const resultado = await inicializarModulo('tributaria');
  if (!resultado) return;
  perfil_usuario = resultado.perfil;
  empresa_activa = resultado.empresa;
  setBreadcrumb('Tributaria');
  activarTab('ventas');
})();

function activarTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
  document.getElementById('tab-' + tab).classList.add('activo');
  const area = document.getElementById('contenido-tab');
  const mapa = {
    ventas:   () => renderTabVentas(area),
    compras:  () => renderTabCompras(area),
    resumen:  () => renderTabResumen(area),
    importar: () => renderTabImportarSunat(area),
  };
  if (mapa[tab]) mapa[tab]();
}
</script>
</body>
</html>
