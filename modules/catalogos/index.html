<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogos — NEXUM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="../../css/main.css">
  <link rel="stylesheet" href="../../css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="../../js/config.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/tema.js"></script>
  <script src="../../js/notas.js?v=2&t=20260506"></script>
  <script src="../../js/layout.js"></script>
</head>
<body>
<div class="nexum-layout">
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="cerrarSidebar()"></div>
  <aside class="sidebar" id="sidebar"></aside>
  <div class="contenido-principal">
    <header class="header-top" id="header-top"></header>
    <main class="area-contenido">

      <div class="page-header">
        <div>
          <h1>🗂️ Catálogos de empresa</h1>
          <p>Clientes, proveedores, conceptos, proyectos, medios de pago y trabajadores</p>
        </div>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:24px;border-bottom:2px solid var(--color-borde);overflow-x:auto;">
        <button class="tab-btn activo" id="tab-clientes"       onclick="activarTab('clientes')">🏢 Clientes/Proveedores</button>
        <button class="tab-btn"        id="tab-conceptos"      onclick="activarTab('conceptos')">📂 Conceptos</button>
        <button class="tab-btn"        id="tab-autorizaciones" onclick="activarTab('autorizaciones')">✍️ Autorizaciones</button>
        <button class="tab-btn"        id="tab-proyectos"      onclick="activarTab('proyectos')">🏗️ Proyectos</button>
        <button class="tab-btn"        id="tab-mediospago"     onclick="activarTab('mediospago')">💳 Medios de pago</button>
        <button class="tab-btn"        id="tab-trabajadores"   onclick="activarTab('trabajadores')">👷 Trabajadores</button>
      </div>

      <div id="contenido-tab">
        <div class="cargando"><div class="spinner"></div><span>Cargando…</span></div>
      </div>

    </main>
  </div>
</div>

<div id="modal-container"></div>

<style>
.tab-btn {
  padding:10px 16px; border:none; background:none; cursor:pointer;
  font-family:var(--font); font-size:13px; font-weight:500;
  color:var(--color-texto-suave); border-bottom:2px solid transparent;
  margin-bottom:-2px; transition:all 0.2s; white-space:nowrap;
}
.tab-btn:hover { color:var(--color-primario); }
.tab-btn.activo { color:var(--color-secundario); border-bottom-color:var(--color-secundario); }
</style>

<script src="../../modules/catalogos/modules/cat-clientes.js"></script>
<script src="../../modules/catalogos/modules/cat-conceptos.js"></script>
<script src="../../modules/catalogos/modules/cat-autorizaciones.js"></script>
<script src="../../modules/catalogos/modules/cat-proyectos.js"></script>
<script src="../../modules/catalogos/modules/cat-mediospago.js"></script>
<script src="../../modules/catalogos/modules/cat-trabajadores.js"></script>

<script>
let perfil_usuario = null;
let empresa_activa = null;

(async () => {
  const resultado = await inicializarModulo('catalogos');
  if (!resultado) return;
  perfil_usuario = resultado.perfil;
  empresa_activa = resultado.empresa;
  setBreadcrumb('Catálogos');
  activarTab('clientes');
})();

function activarTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
  document.getElementById('tab-' + tab).classList.add('activo');
  const area = document.getElementById('contenido-tab');
  const mapa = {
    clientes:       () => renderTabClientes(area),
    conceptos:      () => renderTabConceptos(area),
    autorizaciones: () => renderTabAutorizaciones(area),
    proyectos:      () => renderTabProyectos(area),
    mediospago:     () => renderTabMediosPago(area),
    trabajadores:   () => renderTabTrabajadores(area),
  };
  if (mapa[tab]) mapa[tab]();
}
</script>
</body>
</html>
