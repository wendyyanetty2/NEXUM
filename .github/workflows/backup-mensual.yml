name: Backup Mensual NEXUM

on:
  schedule:
    - cron: '0 3 1 * *'   # Día 1 de cada mes a las 3:00 AM UTC
  workflow_dispatch:        # Ejecución manual desde GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar fecha del backup
        id: fecha
        run: |
          echo "anio=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "mes=$(date +%m)" >> $GITHUB_OUTPUT
          echo "periodo=$(date +%Y-%m)" >> $GITHUB_OUTPUT
          echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      - name: Crear directorio de backup
        run: |
          mkdir -p "backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}"

      - name: Exportar tablas desde Supabase REST API
        env:
          SUPA_URL: ${{ secrets.NEXUM_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.NEXUM_SUPABASE_KEY }}
          PERIODO:  ${{ steps.fecha.outputs.periodo }}
        run: |
          DIR="backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}"
          HEADERS='-H "apikey: '"$SUPA_KEY"'" -H "Authorization: Bearer '"$SUPA_KEY"'" -H "Accept: application/json"'

          exportar() {
            local tabla=$1
            local filtro=$2
            curl -s --max-time 60 \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -H "Accept: application/json" \
              -H "Prefer: count=none" \
              "$SUPA_URL/rest/v1/$tabla?select=*${filtro:+&$filtro}" \
              -o "$DIR/${tabla}.json" || echo "[]" > "$DIR/${tabla}.json"
            echo "  ✓ $tabla: $(wc -c < "$DIR/${tabla}.json") bytes"
          }

          echo "Exportando tablas para periodo $PERIODO..."
          exportar "movimientos"       "periodo=eq.$PERIODO"
          exportar "tesoreria_mbd"     "periodo=eq.$PERIODO"
          exportar "rh_registros"      ""
          exportar "rh_movimiento_links" ""
          exportar "notas_operativas"  ""
          exportar "alertas_sistema"   "estado=eq.activa"
          exportar "empresas"          ""

          # Unir todo en un solo JSON de backup
          python3 - <<'PYEOF'
          import json, os, glob
          directorio = os.environ.get("DIR", ".")
          periodo    = os.environ.get("PERIODO", "")
          backup = {"periodo": periodo, "generado_en": "$(date -u '+%Y-%m-%dT%H:%M:%SZ')", "tablas": {}}
          for f in glob.glob(f"{directorio}/*.json"):
            tabla = os.path.basename(f).replace(".json", "")
            if tabla == "backup": continue
            try:
              with open(f) as fp:
                backup["tablas"][tabla] = json.load(fp)
              os.remove(f)
            except:
              backup["tablas"][tabla] = []
          salida = f"{directorio}/backup_{periodo}.json"
          with open(salida, "w", encoding="utf-8") as fp:
            json.dump(backup, fp, ensure_ascii=False, indent=2)
          print(f"Backup generado: {salida}")
          PYEOF
        shell: bash

      - name: Verificar backup generado
        run: |
          ARCHIVO="backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}/backup_${{ steps.fecha.outputs.periodo }}.json"
          BYTES=$(wc -c < "$ARCHIVO")
          echo "Archivo: $ARCHIVO ($BYTES bytes)"
          if [ "$BYTES" -lt 50 ]; then
            echo "⚠️ Advertencia: backup vacío o muy pequeño"
            exit 1
          fi

      - name: Commit y push del backup
        run: |
          git config user.email "backup-bot@nexum.app"
          git config user.name "NEXUM Backup Bot"
          git add "backups/"
          git diff --staged --quiet && echo "Sin cambios para commit" || \
            git commit -m "Backup automático ${{ steps.fecha.outputs.periodo }} — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Resumen del backup
        if: always()
        run: |
          echo "============================================"
          echo "NEXUM — Backup mensual ${{ steps.fecha.outputs.periodo }}"
          echo "Ejecutado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Estado: ${{ job.status }}"
          echo "============================================"
