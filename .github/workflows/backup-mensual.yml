name: Backup Mensual NEXUM

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Configurar fecha
        id: fecha
        run: |
          echo "anio=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "mes=$(date +%m)" >> $GITHUB_OUTPUT
          echo "periodo=$(date +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Crear directorio
        run: mkdir -p "backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}"

      - name: Exportar tablas desde Supabase
        env:
          SUPA_URL: ${{ secrets.NEXUM_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.NEXUM_SUPABASE_KEY }}
          PERIODO: ${{ steps.fecha.outputs.periodo }}
          BACKUP_DIR: backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}
        run: |
          set +e

          curl_tabla() {
            local tabla=$1
            local filtro=$2
            local url="${SUPA_URL}/rest/v1/${tabla}?select=*"
            [ -n "$filtro" ] && url="${url}&${filtro}"
            curl -sf --max-time 60 \
              -H "apikey: ${SUPA_KEY}" \
              -H "Authorization: Bearer ${SUPA_KEY}" \
              -H "Accept: application/json" \
              -H "Prefer: count=none" \
              "$url" -o "${BACKUP_DIR}/${tabla}.json" 2>/dev/null
            if [ $? -ne 0 ] || [ ! -s "${BACKUP_DIR}/${tabla}.json" ]; then
              printf '[]' > "${BACKUP_DIR}/${tabla}.json"
              echo "  aviso: $tabla sin datos"
            else
              echo "  ok: $tabla ($(wc -c < "${BACKUP_DIR}/${tabla}.json") bytes)"
            fi
          }

          curl_tabla "movimientos"         "periodo=eq.${PERIODO}"
          curl_tabla "tesoreria_mbd"       "periodo=eq.${PERIODO}"
          curl_tabla "rh_registros"        ""
          curl_tabla "rh_movimiento_links" ""
          curl_tabla "notas_operativas"    ""
          curl_tabla "alertas_sistema"     "estado=eq.activa"
          curl_tabla "empresas"            ""

          python3 -c "
          import json, os, glob, datetime
          d = os.environ['BACKUP_DIR']
          p = os.environ['PERIODO']
          ts = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          backup = {'periodo': p, 'generado_en': ts, 'tablas': {}}
          for f in sorted(glob.glob(d + '/*.json')):
              t = os.path.basename(f).replace('.json','')
              if t.startswith('backup'): continue
              try:
                  data = json.load(open(f, encoding='utf-8'))
                  backup['tablas'][t] = data if isinstance(data, list) else []
                  os.remove(f)
              except:
                  backup['tablas'][t] = []
          out = d + '/backup_' + p + '.json'
          json.dump(backup, open(out, 'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          total = sum(len(v) for v in backup['tablas'].values())
          print('Backup guardado: ' + out + ' (' + str(total) + ' registros)')
          "

      - name: Verificar backup
        run: |
          F="backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}/backup_${{ steps.fecha.outputs.periodo }}.json"
          [ -f "$F" ] && echo "OK: $F ($(wc -c < "$F") bytes)" || { echo "ERROR: no se encontro $F"; exit 1; }

      - name: Guardar backup en repositorio
        run: |
          git config user.email "backup-bot@nexum.app"
          git config user.name "NEXUM Backup Bot"
          git add backups/
          if git diff --staged --quiet; then
            echo "Sin cambios nuevos"
          else
            git commit -m "backup: ${{ steps.fecha.outputs.periodo }} — $(date +%Y-%m-%d)"
            git push
          fi

      - name: Resumen
        if: always()
        run: echo "NEXUM Backup ${{ steps.fecha.outputs.periodo }} finalizado con estado ${{ job.status }}"
