name: Backup Mensual NEXUM

on:
  schedule:
    - cron: '0 3 1 * *'   # Día 1 de cada mes a las 3:00 AM UTC
  workflow_dispatch:        # Ejecución manual desde GitHub Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar fecha del backup
        id: fecha
        run: |
          echo "anio=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "mes=$(date +%m)" >> $GITHUB_OUTPUT
          echo "periodo=$(date +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Crear directorio de backup
        run: |
          mkdir -p "backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}"

      - name: Exportar tablas desde Supabase REST API
        env:
          SUPA_URL: ${{ secrets.NEXUM_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.NEXUM_SUPABASE_KEY }}
          PERIODO:  ${{ steps.fecha.outputs.periodo }}
          BACKUP_DIR: backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}
        run: |
          set +e  # No fallar si un curl individual falla

          exportar() {
            local tabla=$1
            local filtro=$2
            local url="$SUPA_URL/rest/v1/$tabla?select=*"
            if [ -n "$filtro" ]; then url="${url}&${filtro}"; fi

            curl -sf --max-time 60 \
              -H "apikey: $SUPA_KEY" \
              -H "Authorization: Bearer $SUPA_KEY" \
              -H "Accept: application/json" \
              -H "Prefer: count=none" \
              "$url" -o "$BACKUP_DIR/${tabla}.json"

            if [ $? -ne 0 ] || [ ! -f "$BACKUP_DIR/${tabla}.json" ]; then
              echo "[]" > "$BACKUP_DIR/${tabla}.json"
              echo "  ⚠ $tabla: sin datos (curl falló o secrets no configurados)"
            else
              local bytes
              bytes=$(wc -c < "$BACKUP_DIR/${tabla}.json")
              echo "  ✓ $tabla: ${bytes} bytes"
            fi
          }

          echo "Exportando tablas para periodo $PERIODO..."
          exportar "movimientos"         "periodo=eq.$PERIODO"
          exportar "tesoreria_mbd"       "periodo=eq.$PERIODO"
          exportar "rh_registros"        ""
          exportar "rh_movimiento_links" ""
          exportar "notas_operativas"    ""
          exportar "alertas_sistema"     "estado=eq.activa"
          exportar "empresas"            ""

          echo "Generando archivo de backup consolidado..."
          python3 << PYEOF
import json, os, glob, datetime

directorio = os.environ["BACKUP_DIR"]
periodo    = os.environ["PERIODO"]
ahora      = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ")

backup = {"periodo": periodo, "generado_en": ahora, "tablas": {}}

for f in sorted(glob.glob(directorio + "/*.json")):
    tabla = os.path.basename(f).replace(".json", "")
    if tabla.startswith("backup"):
        continue
    try:
        with open(f, encoding="utf-8") as fp:
            data = json.load(fp)
        backup["tablas"][tabla] = data if isinstance(data, list) else []
        os.remove(f)
    except Exception as e:
        print("  aviso: no se pudo leer " + tabla + ": " + str(e))
        backup["tablas"][tabla] = []

salida = directorio + "/backup_" + periodo + ".json"
with open(salida, "w", encoding="utf-8") as fp:
    json.dump(backup, fp, ensure_ascii=False, indent=2)

total = sum(len(v) for v in backup["tablas"].values())
print("Backup: " + salida + " (" + str(total) + " registros)")
PYEOF

      - name: Verificar backup generado
        run: |
          ARCHIVO="backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}/backup_${{ steps.fecha.outputs.periodo }}.json"
          if [ ! -f "$ARCHIVO" ]; then
            echo "❌ Archivo no encontrado: $ARCHIVO"
            exit 1
          fi
          BYTES=$(wc -c < "$ARCHIVO")
          echo "✓ Backup: $ARCHIVO (${BYTES} bytes)"

      - name: Commit y push del backup
        run: |
          git config user.email "backup-bot@nexum.app"
          git config user.name "NEXUM Backup Bot"
          git add "backups/"
          if git diff --staged --quiet; then
            echo "Sin cambios para commit"
          else
            git commit -m "Backup automático ${{ steps.fecha.outputs.periodo }} — $(date +%Y-%m-%d)"
            git push origin HEAD
          fi

      - name: Resumen del backup
        if: always()
        run: |
          echo "============================================"
          echo "NEXUM — Backup mensual ${{ steps.fecha.outputs.periodo }}"
          echo "Ejecutado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Estado: ${{ job.status }}"
          echo "============================================"
