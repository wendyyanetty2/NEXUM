name: Backup Mensual NEXUM

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar fecha del backup
        id: fecha
        run: |
          echo "anio=$(date +%Y)" >> $GITHUB_OUTPUT
          echo "mes=$(date +%m)" >> $GITHUB_OUTPUT
          echo "periodo=$(date +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Crear directorio de backup
        run: mkdir -p "backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}"

      - name: Exportar tablas desde Supabase
        env:
          SUPA_URL: ${{ secrets.NEXUM_SUPABASE_URL }}
          SUPA_KEY: ${{ secrets.NEXUM_SUPABASE_KEY }}
          PERIODO: ${{ steps.fecha.outputs.periodo }}
          BACKUP_DIR: backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}
        run: |
          set +e

          curl_tabla() {
            local tabla=$1
            local filtro=$2
            local url="${SUPA_URL}/rest/v1/${tabla}?select=*"
            [ -n "$filtro" ] && url="${url}&${filtro}"
            curl -sf --max-time 60 \
              -H "apikey: ${SUPA_KEY}" \
              -H "Authorization: Bearer ${SUPA_KEY}" \
              -H "Accept: application/json" \
              -H "Prefer: count=none" \
              "$url" -o "${BACKUP_DIR}/${tabla}.json"
            if [ $? -ne 0 ] || [ ! -s "${BACKUP_DIR}/${tabla}.json" ]; then
              printf '[]' > "${BACKUP_DIR}/${tabla}.json"
              echo "  warn: $tabla sin datos"
            else
              echo "  ok: $tabla ($(wc -c < "${BACKUP_DIR}/${tabla}.json") bytes)"
            fi
          }

          echo "Exportando tablas para $PERIODO..."
          curl_tabla "movimientos"         "periodo=eq.${PERIODO}"
          curl_tabla "tesoreria_mbd"       "periodo=eq.${PERIODO}"
          curl_tabla "rh_registros"        ""
          curl_tabla "rh_movimiento_links" ""
          curl_tabla "notas_operativas"    ""
          curl_tabla "alertas_sistema"     "estado=eq.activa"
          curl_tabla "empresas"            ""

          echo "Consolidando en archivo de backup..."
          python3 -c "
          import json, os, glob, datetime
          d = os.environ['BACKUP_DIR']
          p = os.environ['PERIODO']
          ahora = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          backup = {'periodo': p, 'generado_en': ahora, 'tablas': {}}
          for f in sorted(glob.glob(d + '/*.json')):
              tabla = os.path.basename(f).replace('.json','')
              if tabla.startswith('backup'): continue
              try:
                  data = json.load(open(f, encoding='utf-8'))
                  backup['tablas'][tabla] = data if isinstance(data, list) else []
                  os.remove(f)
              except Exception as e:
                  backup['tablas'][tabla] = []
          salida = d + '/backup_' + p + '.json'
          json.dump(backup, open(salida,'w', encoding='utf-8'), ensure_ascii=False, indent=2)
          total = sum(len(v) for v in backup['tablas'].values())
          print('Backup: ' + salida + ' (' + str(total) + ' registros)')
          "

      - name: Verificar backup
        run: |
          ARCHIVO="backups/${{ steps.fecha.outputs.anio }}/${{ steps.fecha.outputs.mes }}/backup_${{ steps.fecha.outputs.periodo }}.json"
          if [ ! -f "$ARCHIVO" ]; then
            echo "ERROR: No se encontro el archivo $ARCHIVO"
            exit 1
          fi
          echo "OK: $ARCHIVO ($(wc -c < "$ARCHIVO") bytes)"

      - name: Commit y push del backup
        run: |
          git config user.email "backup-bot@nexum.app"
          git config user.name "NEXUM Backup Bot"
          git add "backups/"
          if git diff --staged --quiet; then
            echo "Sin cambios"
          else
            git commit -m "Backup ${{ steps.fecha.outputs.periodo }} — $(date +%Y-%m-%d)"
            git push origin HEAD
          fi

      - name: Resumen
        if: always()
        run: |
          echo "NEXUM Backup ${{ steps.fecha.outputs.periodo }} — Estado: ${{ job.status }}"
