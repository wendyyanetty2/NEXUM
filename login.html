<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — NEXUM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-header">
      <div class="logo-texto">NEXUM</div>
      <div class="logo-claim">El vínculo que sustenta</div>
    </div>

    <div class="auth-body">

      <!-- ── Panel: Iniciar sesión ────────────────────────── -->
      <div id="panel-login">
        <h2>Bienvenido</h2>
        <p class="subtitulo">Ingresa tus credenciales para continuar</p>

        <div id="alerta-login" class="alerta-error"></div>

        <form id="form-login" novalidate>

          <div class="input-grupo">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" placeholder="usuario@correo.com"
                   autocomplete="email" required>
          </div>

          <div class="input-grupo">
            <label for="password">Contraseña</label>
            <input type="password" id="password" placeholder="••••••••"
                   autocomplete="current-password" required>
            <button type="button" class="toggle-pass" onclick="togglePassword()"
                    title="Mostrar/ocultar contraseña">👁</button>
          </div>

          <a class="link-olvide" onclick="mostrarRecuperar()">
            ¿Olvidaste tu contraseña?
          </a>

          <button type="submit" class="btn-submit" id="btn-login">
            <span id="btn-login-texto">Ingresar</span>
          </button>

        </form>
      </div>

      <!-- ── Panel: Recuperar contraseña ─────────────────── -->
      <div id="panel-recuperar">
        <h2>Recuperar contraseña</h2>
        <p class="subtitulo">Te enviaremos un enlace a tu correo</p>

        <div id="alerta-recuperar" class="alerta-error"></div>
        <div id="exito-recuperar" class="alerta-exito"></div>

        <form id="form-recuperar" novalidate>

          <div class="input-grupo">
            <label for="email-recuperar">Correo electrónico</label>
            <input type="email" id="email-recuperar" placeholder="usuario@correo.com"
                   autocomplete="email" required>
          </div>

          <button type="submit" class="btn-submit" id="btn-recuperar">
            <span>Enviar enlace de recuperación</span>
          </button>

          <br>
          <a class="link-olvide" style="text-align:center; display:block; margin-top:12px;"
             onclick="mostrarLogin()">
            ← Volver al inicio de sesión
          </a>

        </form>
      </div>

    </div>

    <div class="auth-footer">
      NEXUM v3.0 &nbsp;·&nbsp; © 2026 JVÑ / PEVAL
    </div>

  </div>

  <script>
    // ── Redirigir si ya tiene sesión ─────────────────────────────
    (async () => {
      const { data: { session } } = await _supabase.auth.getSession();
      if (session) {
        const empresa = sessionStorage.getItem('nexum_empresa_activa');
        window.location.href = empresa ? '/dashboard.html' : '/selector.html';
      }
    })();

    // ── Login ────────────────────────────────────────────────────
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const alerta   = document.getElementById('alerta-login');
      const btn      = document.getElementById('btn-login');
      const texto    = document.getElementById('btn-login-texto');

      alerta.classList.remove('visible');
      btn.disabled = true;
      texto.textContent = 'Verificando…';

      const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

      if (error) {
        btn.disabled = false;
        texto.textContent = 'Ingresar';
        let msg = 'Credenciales incorrectas. Verifica tu correo y contraseña.';
        if (error.message.includes('Email not confirmed')) {
          msg = 'Debes confirmar tu correo antes de ingresar. Revisa tu bandeja.';
        }
        alerta.textContent = msg;
        alerta.classList.add('visible');
        return;
      }

      // Login exitoso → verificar perfil en tabla usuarios
      const { data: perfil } = await _supabase
        .from('usuarios')
        .select('*')
        .eq('auth_id', data.user.id)
        .single();

      if (!perfil || !perfil.activo) {
        await _supabase.auth.signOut();
        btn.disabled = false;
        texto.textContent = 'Ingresar';
        alerta.textContent = 'Tu cuenta está inactiva. Contacta al administrador.';
        alerta.classList.add('visible');
        return;
      }

      window.location.href = '/selector.html';
    });

    // ── Recuperar contraseña ──────────────────────────────────────
    document.getElementById('form-recuperar').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email   = document.getElementById('email-recuperar').value.trim();
      const alerta  = document.getElementById('alerta-recuperar');
      const exito   = document.getElementById('exito-recuperar');
      const btn     = document.getElementById('btn-recuperar');

      alerta.classList.remove('visible');
      exito.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Enviando…';

      const { error } = await _supabase.auth.resetPasswordForEmail(email, {
        redirectTo: `${window.location.origin}/cambiar-password.html`
      });

      btn.disabled = false;
      btn.textContent = 'Enviar enlace de recuperación';

      if (error) {
        alerta.textContent = 'No se pudo enviar el correo. Verifica la dirección ingresada.';
        alerta.classList.add('visible');
      } else {
        exito.textContent = `✓ Enlace enviado a ${email}. Revisa tu bandeja de entrada (y spam).`;
        exito.classList.add('visible');
      }
    });

    // ── Alternar visibilidad de contraseña ────────────────────────
    function togglePassword() {
      const input = document.getElementById('password');
      const btn   = document.querySelector('.toggle-pass');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    // ── Mostrar panel recuperar ───────────────────────────────────
    function mostrarRecuperar() {
      document.getElementById('panel-login').classList.add('oculto');
      document.getElementById('panel-recuperar').classList.add('visible');
      // Pre-llenar email si ya fue ingresado
      const emailLogin = document.getElementById('email').value;
      if (emailLogin) document.getElementById('email-recuperar').value = emailLogin;
    }

    function mostrarLogin() {
      document.getElementById('panel-login').classList.remove('oculto');
      document.getElementById('panel-recuperar').classList.remove('visible');
    }
  </script>
</body>
</html>
