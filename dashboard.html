<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — NEXUM</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/assets/icons/icon-192.png" type="image/png">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tema.js"></script>
</head>
<body>

<div class="nexum-layout">

  <!-- ── Overlay para móvil ─────────────────────────────── -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="cerrarSidebar()"></div>

  <!-- ══════════════════════════════════════════════════════
       SIDEBAR
  ═══════════════════════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
      <div class="nombre">NEXUM</div>
      <div class="claim">El vínculo que sustenta</div>
    </div>

    <!-- Empresa activa -->
    <div class="sidebar-empresa" id="sidebar-empresa">
      <div class="label">Empresa activa</div>
      <div class="nombre-empresa" id="empresa-nombre">Cargando…</div>
      <div class="ruc-empresa" id="empresa-ruc"></div>
    </div>

    <!-- Navegación -->
    <nav class="sidebar-nav">
      <div class="nav-seccion">Módulos</div>

      <a class="nav-item activo" id="nav-dashboard" onclick="navegarA('dashboard')">
        <span class="icono">🏠</span> Dashboard
      </a>

      <a class="nav-item" id="nav-admin" onclick="navegarA('admin')">
        <span class="icono">⚙️</span> Administración
      </a>

      <a class="nav-item" id="nav-catalogos" onclick="navegarA('catalogos')">
        <span class="icono">🗂️</span> Catálogos
      </a>

      <a class="nav-item" id="nav-tesoreria" onclick="navegarA('tesoreria')">
        <span class="icono">🏦</span> Tesorería
      </a>

      <a class="nav-item" id="nav-planilla" onclick="navegarA('planilla')">
        <span class="icono">👥</span> Planilla
      </a>

      <a class="nav-item" id="nav-tributaria" onclick="navegarA('tributaria')">
        <span class="icono">📋</span> Tributaria
      </a>

      <a class="nav-item" id="nav-reportes" onclick="navegarA('reportes')">
        <span class="icono">📊</span> Reportes
      </a>

      <a class="nav-item" id="nav-contabilidad" onclick="navegarA('contabilidad')">
        <span class="icono">📒</span> Contabilidad
      </a>

      <a class="nav-item" id="nav-conciliacion" onclick="navegarA('conciliacion')">
        <span class="icono">🔗</span> Conciliación
      </a>
    </nav>

    <!-- Pie del sidebar -->
    <div class="sidebar-footer">
      <button class="btn-sidebar-accion" onclick="cambiarEmpresa()">
        🔄 Cambiar empresa
      </button>
      <button class="btn-sidebar-accion" onclick="abrirCambiarPassword()">
        🔑 Cambiar contraseña
      </button>
      <button class="btn-sidebar-accion peligro" onclick="confirmarCerrarSesion()">
        🚪 Cerrar sesión
      </button>
    </div>

  </aside>

  <!-- ══════════════════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ═══════════════════════════════════════════════════════ -->
  <div class="contenido-principal">

    <!-- Header superior -->
    <header class="header-top">
      <div class="header-izq">
        <button class="btn-menu-movil" onclick="abrirSidebar()" title="Menú">☰</button>
        <div class="breadcrumb" id="breadcrumb">
          NEXUM &rsaquo; <span>Dashboard</span>
        </div>
      </div>
      <div class="header-der">
        <button class="btn-tema" onclick="alternarTema()" title="Cambiar tema">🌙</button>
        <div class="header-usuario">
          <div class="avatar" id="avatar-usuario">W</div>
          <span class="nombre-usuario" id="header-nombre">Wendy</span>
        </div>
      </div>
    </header>

    <!-- Área de contenido dinámica -->
    <main class="area-contenido" id="area-contenido">
      <div class="cargando">
        <div class="spinner"></div>
        <span>Cargando…</span>
      </div>
    </main>

  </div>
</div>

<!-- ══════════════════════════════════════════════════════
     MODAL: Cambiar contraseña
═══════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal-password" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h3>🔑 Cambiar contraseña</h3>
      <button class="modal-cerrar" onclick="cerrarModalPassword()">✕</button>
    </div>
    <div class="modal-body">
      <div id="alerta-password-modal" class="alerta-error"></div>
      <div id="exito-password-modal" class="alerta-exito"></div>
      <div class="campo">
        <label>Nueva contraseña <span class="req">*</span></label>
        <input type="password" id="nueva-password" placeholder="Mínimo 8 caracteres">
      </div>
      <div class="campo">
        <label>Confirmar contraseña <span class="req">*</span></label>
        <input type="password" id="confirmar-password" placeholder="Repite la contraseña">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secundario" onclick="cerrarModalPassword()">Cancelar</button>
      <button class="btn btn-primario" onclick="guardarNuevaPassword()" id="btn-guardar-pass">
        Guardar contraseña
      </button>
    </div>
  </div>
</div>

<script>
// ── Variables de estado ───────────────────────────────────────────
let modulo_actual = 'dashboard';
let perfil_usuario = null;
let empresa_activa = null;

// ── Inicialización ────────────────────────────────────────────────
(async () => {
  const { sesion, empresa } = await protegerPaginaConEmpresa();
  if (!sesion || !empresa) return;

  empresa_activa  = empresa;
  perfil_usuario  = await obtenerPerfil();

  if (!perfil_usuario) { await cerrarSesion(); return; }

  // Llenar datos en el layout
  document.getElementById('empresa-nombre').textContent = empresa_activa.nombre;
  document.getElementById('empresa-ruc').textContent    = 'RUC: ' + empresa_activa.ruc;
  document.getElementById('header-nombre').textContent  = perfil_usuario.nombre.split(' ')[0];
  document.getElementById('avatar-usuario').textContent =
    perfil_usuario.nombre.charAt(0).toUpperCase();

  // Aplicar color de la empresa activa en el sidebar
  if (empresa_activa.color_primario) {
    document.querySelector('.sidebar').style.background = empresa_activa.color_primario;
  }

  // Cargar módulo inicial
  navegarA('dashboard');
})();

// ── Navegación entre módulos ──────────────────────────────────────
function navegarA(modulo) {
  modulo_actual = modulo;

  // Actualizar nav activo
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('activo'));
  const navEl = document.getElementById('nav-' + modulo);
  if (navEl) navEl.classList.add('activo');

  // Actualizar breadcrumb
  const nombres = {
    dashboard:    'Dashboard',
    admin:        'Administración',
    catalogos:    'Catálogos',
    tesoreria:    'Tesorería',
    planilla:     'Planilla',
    tributaria:   'Tributaria',
    reportes:     'Reportes',
    contabilidad: 'Contabilidad',
    conciliacion: 'Conciliación',
  };
  document.getElementById('breadcrumb').innerHTML =
    `NEXUM &rsaquo; <span>${nombres[modulo] || modulo}</span>`;
  document.title = `${nombres[modulo] || modulo} — NEXUM`;

  // Cerrar sidebar en móvil
  cerrarSidebar();

  // Renderizar contenido
  const area = document.getElementById('area-contenido');
  const rutas = {
    admin:        '/modules/admin/index.html',
    catalogos:    '/modules/catalogos/index.html',
    tesoreria:    '/modules/tesoreria/index.html',
    planilla:     '/modules/planilla/index.html',
    tributaria:   '/modules/tributaria/index.html',
    reportes:     '/modules/reportes/index.html',
    contabilidad: '/modules/contabilidad/index.html',
    conciliacion: '/modules/conciliacion/index.html',
  };

  if (modulo === 'dashboard') {
    renderDashboard(area);
  } else if (rutas[modulo]) {
    window.location.href = rutas[modulo];
  } else {
    renderEnConstruccion(area, nombres[modulo]);
  }
}

// ── Dashboard principal ────────────────────────────────────────────
function renderDashboard(area) {
  const ahora   = new Date();
  const hora    = ahora.getHours();
  const saludo  = hora < 12 ? 'Buenos días' : hora < 19 ? 'Buenas tardes' : 'Buenas noches';
  const mesAct  = String(ahora.getMonth() + 1).padStart(2, '0');
  const anioAct = ahora.getFullYear();
  const meses   = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

  area.innerHTML = `
    <div class="fadeIn">
      <div class="page-header" style="margin-bottom:16px">
        <div>
          <h1>${saludo}, ${perfil_usuario?.nombre?.split(' ')[0] || ''} 👋</h1>
          <p style="color:var(--color-texto-suave)">${empresa_activa?.nombre || ''} &nbsp;·&nbsp; ${meses[ahora.getMonth()]} ${anioAct}</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select id="dash-mes" style="padding:7px 12px;border:1px solid var(--color-borde);border-radius:6px;background:var(--color-bg-card);color:var(--color-texto);font-size:13px;font-family:var(--font)">
            ${meses.map((m,i)=>`<option value="${String(i+1).padStart(2,'0')}" ${String(i+1).padStart(2,'0')===mesAct?'selected':''}>${m}</option>`).join('')}
          </select>
          <select id="dash-anio" style="padding:7px 12px;border:1px solid var(--color-borde);border-radius:6px;background:var(--color-bg-card);color:var(--color-texto);font-size:13px;font-family:var(--font)">
            ${[anioAct-1,anioAct,anioAct+1].map(a=>`<option value="${a}" ${a===anioAct?'selected':''}>${a}</option>`).join('')}
          </select>
          <button onclick="cargarDashboard()" style="padding:7px 16px;background:var(--color-secundario);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500">🔄 Actualizar</button>
        </div>
      </div>

      <!-- KPIs principales -->
      <div id="dash-kpis" class="stats-grid" style="margin-bottom:20px">
        <div class="stat-card"><div class="stat-icono azul">⏳</div><div class="stat-info"><div class="numero">…</div><div class="etiqueta">Cargando</div></div></div>
      </div>

      <!-- Inversión por proyecto -->
      <div class="grid-2" style="gap:16px;margin-bottom:20px">
        <div class="card">
          <h3 style="margin-bottom:12px;font-size:14px">📁 Inversión por proyecto</h3>
          <div id="dash-proyectos"><div style="text-align:center;padding:20px;color:var(--color-texto-suave);font-size:13px">Cargando…</div></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:12px;font-size:14px">🏷️ Desglose por concepto</h3>
          <div id="dash-conceptos"><div style="text-align:center;padding:20px;color:var(--color-texto-suave);font-size:13px">Cargando…</div></div>
        </div>
      </div>

      <!-- Pendientes y observados -->
      <div class="grid-2" style="gap:16px;margin-bottom:20px">
        <div class="card">
          <h3 style="margin-bottom:12px;font-size:14px">🔴 Movimientos PENDIENTES de comprobante</h3>
          <div id="dash-pendientes"><div style="text-align:center;padding:20px;color:var(--color-texto-suave);font-size:13px">Cargando…</div></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:12px;font-size:14px">⚠️ Movimientos OBSERVADOS</h3>
          <div id="dash-observados"><div style="text-align:center;padding:20px;color:var(--color-texto-suave);font-size:13px">Cargando…</div></div>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="card">
        <h3 style="margin-bottom:12px;font-size:14px">⚡ Accesos rápidos</h3>
        <div class="grid-3" style="gap:10px">
          ${[
            ['🏦','Tesorería','tesoreria'],
            ['🔗','Conciliación','conciliacion'],
            ['📊','Reportes','reportes'],
            ['👥','Planilla','planilla'],
            ['📋','Tributaria','tributaria'],
            ['⚙️','Administración','admin'],
          ].map(([ico,nom,id])=>`
            <div onclick="navegarA('${id}')" style="display:flex;align-items:center;gap:10px;padding:12px;border:1px solid var(--color-borde);border-radius:8px;cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--color-hover)'" onmouseout="this.style.background=''">
              <span style="font-size:22px">${ico}</span>
              <span style="font-weight:500;font-size:13px">${nom}</span>
            </div>`).join('')}
        </div>
      </div>
    </div>`;

  cargarDashboard();
}

async function cargarDashboard() {
  const mes  = document.getElementById('dash-mes')?.value;
  const anio = document.getElementById('dash-anio')?.value;
  if (!mes || !anio || !empresa_activa) return;

  const desde = `${anio}-${mes}-01`;
  const hasta = `${anio}-${mes}-${new Date(anio, mes, 0).getDate()}`;

  const { data: filas } = await _supabase
    .from('tesoreria_mbd')
    .select('monto,moneda,entrega_doc,concepto,proyecto,empresa')
    .eq('empresa_id', empresa_activa.id)
    .gte('fecha_deposito', desde)
    .lte('fecha_deposito', hasta);

  const todas    = filas || [];
  const soles    = todas.filter(r => r.moneda !== 'USD').reduce((s,r) => s + Number(r.monto), 0);
  const dolares  = todas.filter(r => r.moneda === 'USD').reduce((s,r) => s + Number(r.monto), 0);
  const pendientes = todas.filter(r => r.entrega_doc === 'PENDIENTE');
  const observados = todas.filter(r => r.entrega_doc === 'OBSERVADO');
  const emitidos   = todas.filter(r => r.entrega_doc === 'EMITIDO');

  // KPIs
  const kpisEl = document.getElementById('dash-kpis');
  if (kpisEl) {
    const _card = (icono, cls, num, lbl) =>
      `<div class="stat-card"><div class="stat-icono ${cls}">${icono}</div><div class="stat-info"><div class="numero">${num}</div><div class="etiqueta">${lbl}</div></div></div>`;
    kpisEl.innerHTML =
      _card('💰','verde', `S/ ${_fmt(soles)}`, 'Total mes (S/)') +
      (dolares ? _card('💵','azul', `$ ${_fmt(dolares)}`, 'Total mes (USD)') : '') +
      _card('📄','azul', todas.length, 'Movimientos totales') +
      _card('✅','verde', emitidos.length, 'Con comprobante') +
      _card('🔴','rojo', pendientes.length, 'Pendientes doc.') +
      _card('⚠️','amarillo', observados.length, 'Observados');
  }

  // Inversión por proyecto
  const proyEl = document.getElementById('dash-proyectos');
  if (proyEl) {
    const mapProy = {};
    todas.forEach(r => {
      const k = (r.proyecto || 'Sin proyecto').trim();
      mapProy[k] = (mapProy[k] || 0) + Number(r.monto);
    });
    const sortProy = Object.entries(mapProy).sort((a,b) => b[1]-a[1]);
    const totalProy = sortProy.reduce((s,[,v]) => s+v, 0);
    if (!sortProy.length) {
      proyEl.innerHTML = '<p style="text-align:center;color:var(--color-texto-suave);font-size:13px;padding:16px">Sin datos en este periodo</p>';
    } else {
      proyEl.innerHTML = sortProy.map(([nom, monto]) => {
        const pct = totalProy > 0 ? Math.round(monto / totalProy * 100) : 0;
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
            <span style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${escapar(nom)}</span>
            <span style="font-weight:700;color:var(--color-secundario)">S/ ${_fmt(monto)}</span>
          </div>
          <div style="height:6px;background:var(--color-borde);border-radius:3px">
            <div style="height:6px;background:var(--color-secundario);border-radius:3px;width:${pct}%"></div>
          </div>
          <div style="font-size:11px;color:var(--color-texto-suave);text-align:right">${pct}%</div>
        </div>`;
      }).join('');
    }
  }

  // Desglose por concepto
  const concEl = document.getElementById('dash-conceptos');
  if (concEl) {
    const mapConc = {};
    todas.forEach(r => {
      const k = (r.concepto || 'Sin concepto').trim();
      mapConc[k] = (mapConc[k] || 0) + Number(r.monto);
    });
    const sortConc = Object.entries(mapConc).sort((a,b) => b[1]-a[1]);
    if (!sortConc.length) {
      concEl.innerHTML = '<p style="text-align:center;color:var(--color-texto-suave);font-size:13px;padding:16px">Sin datos en este periodo</p>';
    } else {
      concEl.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
        ${sortConc.map(([nom,monto],i) => `
          <tr style="${i%2===0?'background:var(--color-hover)':''}">
            <td style="padding:5px 8px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapar(nom)}</td>
            <td style="padding:5px 8px;text-align:right;font-weight:600;white-space:nowrap">S/ ${_fmt(monto)}</td>
          </tr>`).join('')}
      </table>`;
    }
  }

  // Panel pendientes
  const pendEl = document.getElementById('dash-pendientes');
  if (pendEl) {
    if (!pendientes.length) {
      pendEl.innerHTML = '<p style="text-align:center;color:var(--color-exito);font-size:13px;padding:16px">✅ Sin pendientes</p>';
    } else {
      const totalPend = pendientes.reduce((s,r)=>s+Number(r.monto),0);
      pendEl.innerHTML = `<div style="padding:8px 0">
        <div style="font-size:22px;font-weight:700;color:#C53030;margin-bottom:4px">${pendientes.length} movimientos</div>
        <div style="font-size:13px;color:var(--color-texto-suave)">Suma pendiente: <strong>S/ ${_fmt(totalPend)}</strong></div>
        <button onclick="window.location.href='/modules/tesoreria/index.html'" style="margin-top:10px;padding:6px 14px;background:rgba(197,48,48,.1);color:#C53030;border:1px solid #C53030;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font)">→ Ir a Tesorería</button>
      </div>`;
    }
  }

  // Panel observados
  const obsEl = document.getElementById('dash-observados');
  if (obsEl) {
    if (!observados.length) {
      obsEl.innerHTML = '<p style="text-align:center;color:var(--color-exito);font-size:13px;padding:16px">✅ Sin observados</p>';
    } else {
      const totalObs = observados.reduce((s,r)=>s+Number(r.monto),0);
      obsEl.innerHTML = `<div style="padding:8px 0">
        <div style="font-size:22px;font-weight:700;color:#D69E2E;margin-bottom:4px">${observados.length} movimientos</div>
        <div style="font-size:13px;color:var(--color-texto-suave)">Suma observada: <strong>S/ ${_fmt(totalObs)}</strong></div>
        <button onclick="window.location.href='/modules/tesoreria/index.html'" style="margin-top:10px;padding:6px 14px;background:rgba(214,158,46,.1);color:#D69E2E;border:1px solid #D69E2E;border-radius:6px;cursor:pointer;font-size:12px;font-family:var(--font)">→ Ir a Tesorería</button>
      </div>`;
    }
  }
}

function _fmt(n) {
  return Number(n).toLocaleString('es-PE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Módulo "En construcción" ──────────────────────────────────────
function renderEnConstruccion(area, nombre) {
  const entregas = {
    'Contabilidad': '1C',
    'Tesorería':    '1B',
    'Planilla':     '1C',
    'Tributaria':   '1D',
    'OCR':          '1B',
    'Reportes':     '1E'
  };
  area.innerHTML = `
    <div class="en-construccion fadeIn">
      <div class="icono-grande">🚧</div>
      <h2>${nombre}</h2>
      <p>Este módulo está en desarrollo y estará disponible próximamente.</p>
      <div class="entrega-tag">📦 Entrega ${entregas[nombre] || '—'}</div>
      <button class="btn btn-secundario" onclick="navegarA('dashboard')" style="margin-top:8px">
        ← Volver al Dashboard
      </button>
    </div>`;
}

// ── Sidebar móvil ─────────────────────────────────────────────────
function abrirSidebar() {
  document.getElementById('sidebar').classList.add('abierto');
  document.getElementById('sidebar-overlay').classList.add('visible');
}
function cerrarSidebar() {
  document.getElementById('sidebar').classList.remove('abierto');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

// ── Cambiar empresa ────────────────────────────────────────────────
function cambiarEmpresa() {
  sessionStorage.removeItem('nexum_empresa_activa');
  window.location.href = '/selector.html';
}

// ── Modal cambiar contraseña ──────────────────────────────────────
function abrirCambiarPassword() {
  document.getElementById('modal-password').style.display = 'flex';
  document.getElementById('nueva-password').value = '';
  document.getElementById('confirmar-password').value = '';
  document.getElementById('alerta-password-modal').classList.remove('visible');
  document.getElementById('exito-password-modal').classList.remove('visible');
}
function cerrarModalPassword() {
  document.getElementById('modal-password').style.display = 'none';
}

async function guardarNuevaPassword() {
  const nueva     = document.getElementById('nueva-password').value;
  const confirmar = document.getElementById('confirmar-password').value;
  const alerta    = document.getElementById('alerta-password-modal');
  const exito     = document.getElementById('exito-password-modal');
  const btn       = document.getElementById('btn-guardar-pass');

  alerta.classList.remove('visible');
  exito.classList.remove('visible');

  if (nueva.length < 8) {
    alerta.textContent = 'La contraseña debe tener al menos 8 caracteres.';
    alerta.classList.add('visible'); return;
  }
  if (nueva !== confirmar) {
    alerta.textContent = 'Las contraseñas no coinciden.';
    alerta.classList.add('visible'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Guardando…';

  const { error } = await _supabase.auth.updateUser({ password: nueva });
  btn.disabled = false;
  btn.textContent = 'Guardar contraseña';

  if (error) {
    alerta.textContent = 'Error al cambiar la contraseña. Intenta de nuevo.';
    alerta.classList.add('visible');
  } else {
    exito.textContent = '✓ Contraseña actualizada correctamente.';
    exito.classList.add('visible');
    setTimeout(() => cerrarModalPassword(), 2000);
  }
}

// ── Cerrar sesión ─────────────────────────────────────────────────
async function confirmarCerrarSesion() {
  const ok = await confirmar('¿Seguro que deseas cerrar sesión?', { btnOk: 'Cerrar sesión' });
  if (ok) await cerrarSesion();
}
</script>
